version: "3.7"

name: durable-wasm-s3-seaweedfs

services:
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command: server -s3 -dir /data -s3.port 8333
    ports:
      - "8333:8333"
      - "9333:9333"
    volumes:
      - ./seaweed_data:/data
    restart: unless-stopped

  host-app:
    build:
      context: ../../../
      dockerfile: durable-wasm/examples/durable-s3/host/Dockerfile
    depends_on:
      - seaweedfs
    environment:
      - LITESTREAM_ACCESS_KEY_ID=admin
      - LITESTREAM_SECRET_ACCESS_KEY=admin123
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=admin123
      - LITESTREAM_ENDPOINT=http://seaweedfs:8333
      - WASM_PATH=/app/worker/worker.wasm
    volumes:
      - shared-data:/app
    restart: "no"

volumes:
  shared-data:
